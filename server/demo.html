<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roman Senate Demo</title>
  <style>
    body { font-family: Inter, system-ui, Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 12px; background:#0f1115; color:#e8ebf0; }
    .row { display:flex; gap:8px; margin-bottom:12px; }
    input, button { border-radius:10px; border:1px solid #2a2f3a; padding:10px 12px; font-size:14px; }
    input { flex:1; background:#151922; color:#e8ebf0; }
    button { background:#2d6cff; color:white; border:none; cursor:pointer; }
    button.secondary { background:#444b57; }
    #chat { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
    .bubble { padding:10px 12px; border-radius:12px; white-space:pre-wrap; line-height:1.35; }
    .caesar { background:#1f3b2f; border:1px solid #2f5e49; }
    .pompey { background:#3a2a1f; border:1px solid #6b4a30; }
    .system { background:#1b2130; border:1px solid #2f3f63; color:#bcd0ff; }
    .meta { font-size:12px; opacity:.75; margin-bottom:4px; }
  </style>
</head>
<body>
  <h2>Roman Senate Debate (separate bubbles per turn)</h2>
  <div class="row">
    <input id="topic" value="Rubicon legality" />
    <button id="start">Start</button>
    <button id="stop" class="secondary">Stop</button>
  </div>
  <div class="row">
    <input id="agenda" placeholder="Moderator agenda update during active debate..." />
    <button id="sendAgenda" class="secondary">Send agenda</button>
  </div>
  <div id="chat"></div>

  <script>
    const chat = document.getElementById('chat');
    const topic = document.getElementById('topic');
    const agenda = document.getElementById('agenda');
    const chatId = 'demo-' + Math.random().toString(36).slice(2, 10);

    function addBubble(kind, text) {
      const div = document.createElement('div');
      div.className = `bubble ${kind}`;
      if (kind === 'caesar' || kind === 'pompey') {
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = kind === 'caesar' ? 'Caesar' : 'Pompey';
        div.appendChild(meta);
      }
      const body = document.createElement('div');
      body.textContent = text.trim();
      div.appendChild(body);
      chat.appendChild(div);
      window.scrollTo(0, document.body.scrollHeight);
    }

    async function postJson(payload) {
      const r = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer dummy',
          'X-Chat-Id': chatId,
        },
        body: JSON.stringify(payload),
      });
      return r;
    }

    async function startDebate() {
      addBubble('system', `Starting: ${topic.value}`);
      const r = await postJson({
        model: 'roman-senate',
        stream: true,
        messages: [{ role: 'user', content: `/debate start ${topic.value}` }],
      });
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        let idx;
        while ((idx = buf.indexOf('\n\n')) !== -1) {
          const block = buf.slice(0, idx);
          buf = buf.slice(idx + 2);
          if (!block.startsWith('data: ')) continue;
          const data = block.slice(6);
          if (data === '[DONE]') return;

          try {
            const obj = JSON.parse(data);
            const delta = obj?.choices?.[0]?.delta?.content || '';
            if (!delta.trim()) continue;

            if (delta.includes('Debate started.')) {
              addBubble('system', 'Debate started.');
              continue;
            }
            if (delta.includes('Debate finished.')) {
              addBubble('system', 'Debate finished.');
              continue;
            }

            if (delta.startsWith('**Caesar:**')) {
              addBubble('caesar', delta.replace(/^\*\*Caesar:\*\*/,'').trim());
            } else if (delta.startsWith('**Pompey:**')) {
              addBubble('pompey', delta.replace(/^\*\*Pompey:\*\*/,'').trim());
            } else {
              addBubble('system', delta);
            }
          } catch (_) {}
        }
      }
    }

    async function stopDebate() {
      const r = await postJson({
        model: 'roman-senate',
        stream: false,
        messages: [{ role: 'user', content: '/debate stop' }],
      });
      const j = await r.json();
      addBubble('system', j?.choices?.[0]?.message?.content || 'Stop sent.');
    }

    async function sendAgenda() {
      if (!agenda.value.trim()) return;
      const r = await postJson({
        model: 'roman-senate',
        stream: false,
        messages: [{ role: 'user', content: agenda.value.trim() }],
      });
      const j = await r.json();
      addBubble('system', `Agenda: ${j?.choices?.[0]?.message?.content || 'sent'}`);
      agenda.value = '';
    }

    document.getElementById('start').onclick = startDebate;
    document.getElementById('stop').onclick = stopDebate;
    document.getElementById('sendAgenda').onclick = sendAgenda;
  </script>
</body>
</html>
